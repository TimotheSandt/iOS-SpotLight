name: SwiftUI Preview Renders

on:
  push:
    paths:
      - "**/*.swift"
  workflow_dispatch:

# Permissions nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate self-contained preview files
        run: |
          cat << 'PYSCRIPT' > /tmp/generate_previews.py
          #!/usr/bin/env python3
          import os
          import re
          import sys
          from pathlib import Path
          from dataclasses import dataclass, field

          IGNORED_DIRS = {
              ".build", "build", "DerivedData", "Pods", ".git",
              "PreviewRenders", "Packages", ".swiftpm", "node_modules"
          }
          SYSTEM_MODULES = {
              "SwiftUI", "Foundation", "UIKit", "Combine", "SwiftData",
              "CoreData", "MapKit", "Charts", "PhotosUI", "AVFoundation",
              "CoreLocation", "CoreImage", "WebKit", "StoreKit",
              "WidgetKit", "AppIntents", "Observation"
          }
          OUTPUT_DIR = "PreviewRenders"

          @dataclass
          class TypeDef:
              name: str
              kind: str
              file_path: str
              source_code: str
              start_line: int
              dependencies: set = field(default_factory=set)

          @dataclass
          class PreviewBlock:
              file_path: str
              file_name: str
              source_code: str
              parent_view: str | None
              imports: list = field(default_factory=list)

          @dataclass
          class FunctionDef:
              name: str
              file_path: str
              source_code: str
              start_line: int

          def find_swift_files(path):
              files = []
              for root, dirs, fnames in os.walk(path):
                  dirs[:] = [d for d in dirs if d not in IGNORED_DIRS]
                  for f in fnames:
                      if f.endswith(".swift") and not f.startswith("._"):
                          files.append(os.path.join(root, f))
              return files

          def extract_balanced(text, pos):
              if pos >= len(text) or text[pos] != "{":
                  return None
              depth = 0
              i = pos
              in_str = False
              in_lc = False
              in_bc = False
              esc = False
              while i < len(text):
                  ch = text[i]
                  if esc:
                      esc = False
                      i += 1
                      continue
                  if in_lc:
                      if ch == "\n":
                          in_lc = False
                      i += 1
                      continue
                  if in_bc:
                      if ch == "*" and i + 1 < len(text) and text[i + 1] == "/":
                          in_bc = False
                          i += 2
                          continue
                      i += 1
                      continue
                  if ch == "\\" and in_str:
                      esc = True
                      i += 1
                      continue
                  if ch == '"' and not in_str:
                      if text[i:i + 3] == '"""':
                          end = text.find('"""', i + 3)
                          if end != -1:
                              i = end + 3
                              continue
                      in_str = True
                      i += 1
                      continue
                  if ch == '"' and in_str:
                      in_str = False
                      i += 1
                      continue
                  if not in_str:
                      if ch == "/" and i + 1 < len(text):
                          if text[i + 1] == "/":
                              in_lc = True
                              i += 2
                              continue
                          if text[i + 1] == "*":
                              in_bc = True
                              i += 2
                              continue
                      if ch == "{":
                          depth += 1
                      elif ch == "}":
                          depth -= 1
                          if depth == 0:
                              return text[pos:i + 1]
                  i += 1
              return None

          def is_top_level_position(text, pos):
              depth = 0
              i = 0
              in_str = False
              in_lc = False
              in_bc = False
              esc = False
              while i < len(text) and i < pos:
                  ch = text[i]
                  if esc:
                      esc = False
                      i += 1
                      continue
                  if in_lc:
                      if ch == "\n":
                          in_lc = False
                      i += 1
                      continue
                  if in_bc:
                      if ch == "*" and i + 1 < len(text) and text[i + 1] == "/":
                          in_bc = False
                          i += 2
                          continue
                      i += 1
                      continue
                  if ch == "\\" and in_str:
                      esc = True
                      i += 1
                      continue
                  if ch == '"' and not in_str:
                      if text[i:i + 3] == '"""':
                          end = text.find('"""', i + 3)
                          if end != -1 and end < pos:
                              i = end + 3
                              continue
                      in_str = True
                      i += 1
                      continue
                  if ch == '"' and in_str:
                      in_str = False
                      i += 1
                      continue
                  if not in_str and ch == "/" and i + 1 < len(text):
                      if text[i + 1] == "/":
                          in_lc = True
                          i += 2
                          continue
                      if text[i + 1] == "*":
                          in_bc = True
                          i += 2
                          continue
                  if not in_str:
                      if ch == "{":
                          depth += 1
                      elif ch == "}":
                          depth = max(0, depth - 1)
                  i += 1
              return depth == 0

          def parse_types(fp, src):
              types = []
              pat = re.compile(
                  r"^[ \t]*(?:@\w+(?:\([^)]*\))?\s+)*(?:(?:public|private|internal|fileprivate|open)\s+)?"
                  r"(?:final\s+)?(struct|class|enum|protocol|actor)\s+(\w+)",
                  re.MULTILINE,
              )
              for m in pat.finditer(src):
                  kind, name = m.group(1), m.group(2)
                  after = src[m.end():]
                  bo = after.find("{")
                  if bo == -1:
                      continue
                  bp = m.end() + bo
                  block = extract_balanced(src, bp)
                  if not block:
                      continue
                  ds = m.start()
                  lines = src[:ds].split("\n")
                  attrs = []
                  for l in reversed(lines):
                      s = l.strip()
                      if s.startswith("@") or s.startswith("//"):
                          attrs.insert(0, l)
                      else:
                          break
                  if attrs:
                      full = "\n".join(attrs) + "\n" + src[ds:bp] + block
                  else:
                      full = src[ds:bp] + block
                  types.append(
                      TypeDef(
                          name=name,
                          kind=kind,
                          file_path=fp,
                          source_code=full,
                          start_line=src[:ds].count("\n") + 1,
                      )
                  )
              return types

          def parse_functions(fp, src):
              functions = []
              pat = re.compile(
                  r"^[ \t]*(?:@\w+(?:\([^)]*\))?\s+)*(?:(?:public|private|internal|fileprivate|open)\s+)?"
                  r"(?:static\s+|class\s+)?func\s+(\w+)\s*\(",
                  re.MULTILINE,
              )
              for m in pat.finditer(src):
                  if not is_top_level_position(src, m.start()):
                      continue
                  name = m.group(1)
                  bp = src.find("{", m.end())
                  if bp == -1:
                      continue
                  block = extract_balanced(src, bp)
                  if not block:
                      continue
                  functions.append(
                      FunctionDef(
                          name=name,
                          file_path=fp,
                          source_code=src[m.start():bp] + block,
                          start_line=src[:m.start()].count("\n") + 1,
                      )
                  )
              return functions

          def parse_previews(fp, src):
              previews = []
              fn = Path(fp).stem
              imports = re.findall(r"^import\s+(\w+)", src, re.MULTILINE)
              pat = re.compile(r"#Preview(?:\s*\([^)]*\))?\s*\{")
              swiftui = {
                  "VStack", "HStack", "ZStack", "Text", "Image", "Button", "NavigationStack", "NavigationView",
                  "List", "Form", "ScrollView", "LazyVGrid", "LazyHGrid", "Section", "Group", "ForEach", "TabView",
                  "NavigationSplitView", "Spacer", "Divider", "Color", "Circle", "Rectangle", "RoundedRectangle",
                  "Capsule", "Toggle", "TextField", "Picker", "Slider", "Stepper", "DatePicker", "ProgressView",
                  "Label", "Link", "Menu", "Sheet", "Alert", "UUID", "Date", "URL", "String", "Int", "Double",
                  "Bool", "CGFloat", "CGSize", "CGPoint", "Font", "EdgeInsets",
              }
              for m in pat.finditer(src):
                  bp = src.rfind("{", m.start(), m.end() + 1)
                  if bp == -1:
                      bp = m.end() - 1
                  block = extract_balanced(src, bp)
                  if not block:
                      continue
                  psrc = src[m.start():bp] + block
                  pv = None
                  for v in re.findall(r"\b([A-Z]\w+)\s*\(", block):
                      if v not in swiftui:
                          pv = v
                          break
                  previews.append(
                      PreviewBlock(file_path=fp, file_name=fn, source_code=psrc, parent_view=pv, imports=imports)
                  )
              return previews

          def find_refs(src, known):
              refs = set()
              for tn in known:
                  pats = [
                      rf"\b{re.escape(tn)}\s*\(",
                      rf"\b{re.escape(tn)}\s*\.",
                      rf":\s*{re.escape(tn)}\b",
                      rf":\s*any\s+{re.escape(tn)}\b",
                      rf":\s*some\s+{re.escape(tn)}\b",
                      rf":\s*\[{re.escape(tn)}\]",
                      rf":\s*\[\s*any\s+{re.escape(tn)}\s*\]",
                      rf"<{re.escape(tn)}>",
                      rf"\b{re.escape(tn)}\s*\?",
                      rf"\bis\s+{re.escape(tn)}\b",
                      rf"\bas\?\s+{re.escape(tn)}\b",
                      rf"\bas!\s+{re.escape(tn)}\b",
                      rf"\bas\s+{re.escape(tn)}\b",
                      rf"\b{re.escape(tn)}\s*:",
                  ]
                  for p in pats:
                      if re.search(p, src):
                          refs.add(tn)
                          break
              return refs

          def find_function_refs(src, known):
              refs = set()
              for fn in known:
                  if re.search(rf"\b{re.escape(fn)}\s*\(", src):
                      refs.add(fn)
              return refs

          def resolve(targets, all_t, resolved=None, depth=0):
              if resolved is None:
                  resolved = set()
              if depth > 20:
                  return []
              result = []
              known = set(all_t.keys())
              for tn in targets:
                  if tn in resolved or tn not in all_t:
                      continue
                  resolved.add(tn)
                  td = all_t[tn]
                  subs = find_refs(td.source_code, known - resolved)
                  if subs:
                      result.extend(resolve(subs, all_t, resolved, depth + 1))
                  result.append(td)
              return result

          def resolve_functions(targets, all_f, resolved=None, depth=0):
              if resolved is None:
                  resolved = set()
              if depth > 20:
                  return []
              result = []
              known = set(all_f.keys())
              for fn in targets:
                  if fn in resolved or fn not in all_f:
                      continue
                  resolved.add(fn)
                  fd = all_f[fn]
                  subs = find_function_refs(fd.source_code, known - resolved)
                  if subs:
                      result.extend(resolve_functions(subs, all_f, resolved, depth + 1))
                  result.append(fd)
              return result

          def remove_modifier_blocks(src, patterns):
              changed = True
              while changed:
                  changed = False
                  for pat in patterns:
                      m = re.search(pat, src, re.MULTILINE)
                      if not m:
                          continue
                      brace_pos = src.find("{", m.start())
                      if brace_pos == -1:
                          continue
                      block = extract_balanced(src, brace_pos)
                      if not block:
                          continue
                      end = brace_pos + len(block)
                      src = src[:m.start()] + src[end:]
                      changed = True
                      break
              return src

          def remove_modifier_calls(src, patterns):
              for pat in patterns:
                  src = re.sub(pat, "", src, flags=re.MULTILINE)
              return src

          def remove_unused_private_functions(src):
              func_pattern = re.compile(
                  r'^[ \t]*(?:@\w+(?:\([^)]*\))?\s+)*private\s+func\s+(\w+)\s*\(',
                  re.MULTILINE,
              )

              changed = True
              while changed:
                  changed = False
                  for match in func_pattern.finditer(src):
                      func_name = match.group(1)
                      brace_pos = src.find("{", match.end())
                      if brace_pos == -1:
                          continue

                      block = extract_balanced(src, brace_pos)
                      if not block:
                          continue

                      line_start = src.rfind("\n", 0, match.start()) + 1
                      src_without_function = src[:line_start] + src[brace_pos + len(block):]
                      refs = len(re.findall(rf"\b{re.escape(func_name)}\b", src_without_function))
                      if refs > 0:
                          continue

                      src = src_without_function
                      changed = True
                      break

              return src

          def sanitize_swiftui_for_render(src):
              # Remove behavior-only modifiers that do not help the static render.
              src = remove_modifier_blocks(src, [
                  r"\.toolbar(?:\s*\([^)]*\))?\s*\{",
                  r"\.navigationDestination\s*\([^)]*\)\s*\{",
                  r"\.sheet(?:\s*\([^)]*\))?\s*\{",
                  r"\.fullScreenCover(?:\s*\([^)]*\))?\s*\{",
                  r"\.popover(?:\s*\([^)]*\))?\s*\{",
                  r"\.confirmationDialog\s*\([^)]*\)\s*\{",
                  r"\.alert\s*\([^)]*\)\s*\{",
                  r"\.tabItem\s*\{",
                  r"\.contextMenu(?:\s*\([^)]*\))?\s*\{",
                  r"\.swipeActions(?:\s*\([^)]*\))?\s*\{",
                  r"\.simultaneousGesture\s*\([^)]*\)\s*\{",
                  r"\.highPriorityGesture\s*\([^)]*\)\s*\{",
                  r"\.gesture\s*\([^)]*\)\s*\{",
                  r"\.onTapGesture(?:\s*\([^)]*\))?\s*\{",
                  r"\.onLongPressGesture(?:\s*\([^)]*\))?\s*\{",
                  r"\.onAppear(?:\s*\([^)]*\))?\s*\{",
                  r"\.task(?:\s*\([^)]*\))?\s*\{",
              ])
              src = remove_modifier_calls(src, [
                  r"\.onAppear\s*\(\s*perform:\s*[A-Za-z_]\w*\s*\)",
                  r"\.task\s*\(\s*[A-Za-z_]\w*\s*\)",
                  r"\.task\s*\(\s*priority:\s*\.\w+\s*,\s*[A-Za-z_]\w*\s*\)",
                  r"\.onTapGesture\s*\(\s*count:\s*\d+\s*,\s*perform:\s*[A-Za-z_]\w*\s*\)",
                  r"\.onLongPressGesture\s*\(\s*minimumDuration:\s*[^,()]+\s*,\s*perform:\s*[A-Za-z_]\w*\s*\)",
                  r"\.simultaneousGesture\s*\([^)]*\)",
                  r"\.highPriorityGesture\s*\([^)]*\)",
                  r"\.gesture\s*\([^)]*\)",
              ])

              # Replace platform-specific or deprecated navigation APIs with render-safe versions.
              src = re.sub(
                  r'\.navigationBarTitle\(\s*"([^"]*)"\s*,\s*displayMode:\s*\.\w+\s*\)',
                  r'.navigationTitle("\1")',
                  src,
              )
              src = re.sub(
                  r'\.navigationBarTitle\(\s*"([^"]*)"\s*\)',
                  r'.navigationTitle("\1")',
                  src,
              )
              src = re.sub(r'\.navigationBarTitleDisplayMode\(\s*\.\w+\s*\)', '', src)

              # Replace behavior containers with layout-neutral wrappers for static snapshots.
              replacements = [
                  (r'(^[ \t]*)NavigationStack\s*\{', r'\1Group {'),
                  (r'(^[ \t]*)NavigationView\s*\{', r'\1Group {'),
                  (r'(^[ \t]*)NavigationSplitView\s*\{', r'\1Group {'),
                  (r'(^[ \t]*)ScrollView\s*(?:\([^)]*\))?\s*\{', r'\1Group {'),
                  (r'(^[ \t]*)TabView\s*\{', r'\1VStack {'),
                  (r'(^[ \t]*)Tab\s*\([^)]*\)\s*\{', r'\1Group {'),
                  (r'(^[ \t]*)NavigationLink\s*\([^)]*\)\s*\{', r'\1Group {'),
              ]
              for pattern, repl in replacements:
                  src = re.sub(pattern, repl, src, flags=re.MULTILINE)

              # Clean up a few toolbar placements that may survive in extracted code.
              src = src.replace(".topBarTrailing", ".automatic")
              src = remove_unused_private_functions(src)
              return src

          def generate(preview, all_t, all_f, same_file):
              lines = [
                  "// Auto-generated by generate_previews.py",
                  f"// Source: {preview.file_path}",
                  "// Do not edit manually; regenerated by CI.",
                  "",
                  "#if canImport(UIKit)",
                  "import UIKit",
                  "#elseif canImport(AppKit)",
                  "import AppKit",
                  "typealias UIColor = NSColor",
                  "extension NSColor {",
                  "    static var systemBackground: NSColor { windowBackgroundColor }",
                  "    static var systemGroupedBackground: NSColor { windowBackgroundColor }",
                  "    static var secondarySystemBackground: NSColor { controlBackgroundColor }",
                  "}",
                  "#endif",
                  "",
                  "extension Color {",
                  "    init(uiColor: UIColor) {",
                  "        #if canImport(UIKit)",
                  "        self.init(uiColor)",
                  "        #else",
                  "        self.init(nsColor: uiColor)",
                  "        #endif",
                  "    }",
                  "}",
                  "#if canImport(AppKit)",
                  "private struct RenderFieldChrome<Content: View>: View {",
                  "    let title: String",
                  "    let content: Content",
                  "    init(_ title: String, @ViewBuilder content: () -> Content) {",
                  "        self.title = title",
                  "        self.content = content()",
                  "    }",
                  "    var body: some View {",
                  "        VStack(alignment: .leading, spacing: 6) {",
                  "            if !title.isEmpty {",
                  "                Text(title)",
                  "                    .font(.caption)",
                  "                    .foregroundStyle(.secondary)",
                  "            }",
                  "            content",
                  "                .frame(maxWidth: .infinity, alignment: .leading)",
                  "                .padding(.horizontal, 12)",
                  "                .padding(.vertical, 10)",
                  "                .background(Color.secondary.opacity(0.12))",
                  "                .clipShape(RoundedRectangle(cornerRadius: 12))",
                  "        }",
                  "    }",
                  "}",
                  "struct TextField: View {",
                  "    let title: String",
                  "    let value: String",
                  "    init(_ title: String, text: Binding<String>) {",
                  "        self.title = title",
                  "        self.value = text.wrappedValue",
                  "    }",
                  "    init(_ title: String, text: Binding<String>, axis: Axis) {",
                  "        self.title = title",
                  "        self.value = text.wrappedValue",
                  "    }",
                  "    var body: some View {",
                  "        RenderFieldChrome(title) {",
                  "            Text(value.isEmpty ? title : value)",
                  "                .foregroundStyle(value.isEmpty ? .secondary : .primary)",
                  "        }",
                  "    }",
                  "}",
                  "struct Picker<SelectionValue, Content: View>: View {",
                  "    let title: String",
                  "    let selectionText: String",
                  "    init(_ title: String, selection: Binding<SelectionValue>, @ViewBuilder content: () -> Content) {",
                  "        self.title = title",
                  "        self.selectionText = String(describing: selection.wrappedValue)",
                  "    }",
                  "    var body: some View {",
                  "        RenderFieldChrome(title) {",
                  "            HStack(spacing: 8) {",
                  "                Text(selectionText)",
                  "                Spacer()",
                  "                Image(systemName: \"chevron.up.chevron.down\")",
                  "                    .font(.caption2)",
                  "                    .foregroundStyle(.secondary)",
                  "            }",
                  "        }",
                  "    }",
                  "}",
                  "struct DatePicker: View {",
                  "    let title: String",
                  "    let value: String",
                  "    init(_ title: String, selection: Binding<Date>, displayedComponents: DatePickerComponents = [.hourAndMinute, .date]) {",
                  "        self.title = title",
                  "        self.value = String(describing: selection.wrappedValue)",
                  "    }",
                  "    var body: some View {",
                  "        RenderFieldChrome(title) {",
                  "            HStack(spacing: 8) {",
                  "                Text(value)",
                  "                Spacer()",
                  "                Image(systemName: \"calendar\")",
                  "                    .foregroundStyle(.secondary)",
                  "            }",
                  "        }",
                  "    }",
                  "}",
                  "struct Toggle<Label: View>: View {",
                  "    let isOn: Bool",
                  "    let label: Label",
                  "    init(isOn: Binding<Bool>, @ViewBuilder label: () -> Label) {",
                  "        self.isOn = isOn.wrappedValue",
                  "        self.label = label()",
                  "    }",
                  "    var body: some View {",
                  "        HStack {",
                  "            label",
                  "            Spacer()",
                  "            Image(systemName: isOn ? \"checkmark.circle.fill\" : \"circle\")",
                  "                .foregroundStyle(isOn ? .green : .secondary)",
                  "        }",
                  "    }",
                  "}",
                  "#endif",
                  "",
              ]
              used = {"SwiftUI"}
              for i in preview.imports:
                  if i in SYSTEM_MODULES:
                      used.add(i)
              for i in sorted(used):
                  lines.append(f"import {i}")
              lines.append("")
              sfn = {td.name for td in same_file}
              known = set(all_t.keys())
              pr = find_refs(preview.source_code, known)
              resolved = resolve(sfn | pr, all_t)
              seen = set()
              for td in resolved:
                  if td.name not in seen:
                      seen.add(td.name)
                      sanitized_source = sanitize_swiftui_for_render(td.source_code)
                      lines.extend([f"// -- {td.kind} {td.name} (from {Path(td.file_path).name}) --", "", sanitized_source, ""])
              function_search_space = [preview.source_code]
              function_search_space.extend(td.source_code for td in resolved)
              function_refs = find_function_refs("\n".join(function_search_space), set(all_f.keys()))
              resolved_functions = resolve_functions(function_refs, all_f)
              seen_functions = set()
              for fd in resolved_functions:
                  if fd.name not in seen_functions:
                      seen_functions.add(fd.name)
                      lines.extend([f"// -- func {fd.name} (from {Path(fd.file_path).name}) --", "", fd.source_code, ""])
              lines.extend(["// -- Preview --", ""])
              bm = re.search(r"\{", preview.source_code)
              if bm:
                  ib = extract_balanced(preview.source_code, bm.start())
                  if ib:
                      inner = sanitize_swiftui_for_render(ib[1:-1].strip())
                      lines.append("struct Preview: View {")
                      lines.append("    var body: some View {")
                      for l in inner.split("\n"):
                          lines.append(f"        {l}")
                      lines.extend(["    }", "}", ""])
                  else:
                      lines.append("// Parse error")
              else:
                  lines.append("// Parse error")
              return "\n".join(lines)

          def main():
              pp = sys.argv[1] if len(sys.argv) > 1 else os.getcwd()
              pp = os.path.abspath(pp)
              op = os.path.join(pp, OUTPUT_DIR)
              print(f"Scan: {pp}\n")
              sf = find_swift_files(pp)
              print(f"   {len(sf)} Swift files")
              all_t = {}
              all_f = {}
              all_p = []
              for fp in sf:
                  try:
                      with open(fp, "r", encoding="utf-8") as f:
                          src = f.read()
                  except Exception:
                      continue
                  for td in parse_types(fp, src):
                      if td.name not in all_t:
                          all_t[td.name] = td
                  for fd in parse_functions(fp, src):
                      if fd.name not in all_f:
                          all_f[fd.name] = fd
                  all_p.extend(parse_previews(fp, src))
              names = sorted(all_t.keys())
              print(f"   {len(all_t)} types ({', '.join(names[:8])}{'...' if len(names) > 8 else ''})")
              print(f"   {len(all_p)} #Preview\n")
              if not all_p:
                  print("No #Preview found.")
                  sys.exit(0)
              os.makedirs(op, exist_ok=True)
              for prev in all_p:
                  sft = [td for td in all_t.values() if td.file_path == prev.file_path]
                  content = generate(prev, all_t, all_f, sft)
                  same_name = [p for p in all_p if p.file_name == prev.file_name]
                  if len(same_name) > 1:
                      idx = same_name.index(prev) + 1
                      oname = f"{prev.file_name}_Preview{idx}.swift"
                  else:
                      oname = f"{prev.file_name}.swift"
                  with open(os.path.join(op, oname), "w", encoding="utf-8") as f:
                      f.write(content)
                  print(f"   {oname} <- {Path(prev.file_path).name}")
              print(f"\n{len(all_p)} file(s) generated in {OUTPUT_DIR}/")

          if __name__ == "__main__":
              main()
          PYSCRIPT
          PYTHONIOENCODING=UTF-8 python3 /tmp/generate_previews.py .

      - name: List generated previews
        run: ls -la PreviewRenders/ || echo "Aucun fichier genere"

      - name: Restore rendered previews cache
        id: preview-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            rendered
            .preview-cache
          key: ${{ runner.os }}-swiftui-render-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-swiftui-render-${{ github.ref_name }}-
            ${{ runner.os }}-swiftui-render-

      - name: Determine impacted previews
        id: impacted
        run: |
          mkdir -p rendered/light rendered/dark .preview-cache
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path(".")
          previews_dir = root / "PreviewRenders"
          cache_dir = root / ".preview-cache"
          previous_manifest = cache_dir / "preview-hashes.txt"
          current_manifest = cache_dir / "preview-hashes.new.txt"
          changed_file = cache_dir / "changed-previews.txt"
          deleted_file = cache_dir / "deleted-previews.txt"

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def read_manifest(path: Path) -> dict[str, str]:
              data: dict[str, str] = {}
              if not path.exists():
                  return data
              for line in path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  name, sha = line.split("\t", 1)
                  data[name] = sha
              return data

          current = {path.stem: digest(path) for path in sorted(previews_dir.glob("*.swift"))}
          previous = read_manifest(previous_manifest)

          current_manifest.write_text(
              "".join(f"{name}\t{sha}\n" for name, sha in sorted(current.items())),
              encoding="utf-8",
          )

          changed = sorted(name for name, sha in current.items() if previous.get(name) != sha)
          deleted = sorted(name for name in previous.keys() if name not in current)

          changed_file.write_text("\n".join(changed) + ("\n" if changed else ""), encoding="utf-8")
          deleted_file.write_text("\n".join(deleted) + ("\n" if deleted else ""), encoding="utf-8")

          print(f"Changed previews: {len(changed)}")
          for name in changed:
              print(f"  - {name}")
          print(f"Deleted previews: {len(deleted)}")
          for name in deleted:
              print(f"  - {name}")
          PY

          while IFS= read -r deleted; do
            [ -n "$deleted" ] || continue
            rm -f "rendered/light/${deleted}.png" "rendered/dark/${deleted}.png"
          done < .preview-cache/deleted-previews.txt

          changed_count="$(wc -l < .preview-cache/changed-previews.txt | tr -d ' ')"
          echo "changed_count=${changed_count}" >> "$GITHUB_OUTPUT"

      - name: Install swiftui-render
        if: steps.impacted.outputs.changed_count != '0'
        run: |
          brew tap olliewagner/swiftui-render
          brew install swiftui-render
          swiftui-render --version

      - name: Render impacted previews
        if: steps.impacted.outputs.changed_count != '0'
        run: |
          failures=0
          : > rendered/render-errors.txt
          : > rendered/render-status.tsv
          while IFS= read -r base; do
            [ -n "$base" ] || continue
            f="PreviewRenders/${base}.swift"
            [ -f "$f" ] || continue
            echo ""
            echo "Rendering $base..."
            light_out="rendered/light/${base}.png"
            rm -f "$light_out"
            swiftui-render render "$f" --iphone --device-frame -o "$light_out"
            if [ $? -ne 0 ] || [ ! -f "$light_out" ]; then
              echo "Echec light: $base" | tee -a rendered/render-errors.txt
              printf '%s\t%s\t%s\n' "$base" "light" "failed" >> rendered/render-status.tsv
              failures=1
            else
              printf '%s\t%s\t%s\n' "$base" "light" "ok" >> rendered/render-status.tsv
            fi
            dark_out="rendered/dark/${base}.png"
            rm -f "$dark_out"
            swiftui-render render "$f" --iphone --device-frame --dark -o "$dark_out"
            if [ $? -ne 0 ] || [ ! -f "$dark_out" ]; then
              echo "Echec dark: $base" | tee -a rendered/render-errors.txt
              printf '%s\t%s\t%s\n' "$base" "dark" "failed" >> rendered/render-status.tsv
              failures=1
            else
              printf '%s\t%s\t%s\n' "$base" "dark" "ok" >> rendered/render-status.tsv
            fi
          done < .preview-cache/changed-previews.txt
          echo ""
          find rendered -name "*.png" | sort
          png_count="$(find rendered -name '*.png' | wc -l | tr -d ' ')"
          echo "PNG generated: $png_count"
          if [ "$png_count" -eq 0 ]; then
            echo "Aucun PNG genere" | tee -a rendered/render-errors.txt
            failures=1
          fi
          if [ $failures -ne 0 ]; then
            echo ""
            echo "Previews en erreur detectes, publication maintenue:"
            cat rendered/render-errors.txt
          fi

      - name: Skip render when no preview changed
        if: steps.impacted.outputs.changed_count == '0'
        run: |
          echo "Aucun preview impacte, reutilisation du cache rendered/"
          touch rendered/render-errors.txt rendered/render-status.tsv
          find rendered -name "*.png" | sort || true

      - name: Generate preview gallery
        run: |
          COMMIT_SHA_SHORT="${GITHUB_SHA::7}"
          COMMIT_SHA_FULL="${GITHUB_SHA}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          TIMESTAMP=$(date -u +"%d/%m/%Y %H:%M UTC")
          ERROR_COUNT=$(wc -l < rendered/render-errors.txt | tr -d ' ')

          cat > rendered/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SwiftUI Previews — ${GITHUB_REPOSITORY}</title>
            <style>
              *{box-sizing:border-box}
              body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#e6edf3;padding:20px 40px;margin:0}
              h1{text-align:center;margin-bottom:8px;font-size:28px}
              .meta{text-align:center;color:#8b949e;font-size:13px;margin-bottom:40px}
              .meta code{background:#161b22;padding:2px 8px;border-radius:4px;color:#58a6ff;font-size:12px}
              .meta a{color:#58a6ff;text-decoration:none}
              .meta a:hover{text-decoration:underline}
              .status{max-width:1000px;margin:0 auto 24px;padding:14px 16px;border-radius:12px;border:1px solid #30363d;background:#161b22}
              .status.error{border-color:#f85149;background:rgba(248,81,73,.08)}
              .status.ok{border-color:#238636;background:rgba(35,134,54,.08)}
              .status strong{display:block;margin-bottom:6px}
              .status ul{margin:8px 0 0 18px;padding:0}
              .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;max-width:1400px;margin:0 auto}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;transition:border-color .2s}
              .card:hover{border-color:#58a6ff}
              .card h2{font-size:15px;margin:0 0 16px;color:#c9d1d9;font-weight:600}
              .card h2 span{color:#8b949e;font-weight:400;font-size:12px}
              .modes{display:flex;gap:12px}
              .mode{flex:1;text-align:center}
              .mode img{max-width:100%;border-radius:8px;border:1px solid #30363d;cursor:pointer;transition:transform .2s}
              .mode img:hover{transform:scale(1.02)}
              .mode .missing{min-height:240px;border-radius:8px;border:1px dashed #f85149;background:rgba(248,81,73,.08);display:flex;align-items:center;justify-content:center;padding:16px;color:#f85149;font-size:13px;line-height:1.4}
              .mode p{font-size:11px;color:#8b949e;margin-top:6px}
              .footer{margin-top:40px;text-align:center;font-size:11px;color:#484f58}
              .footer a{color:#58a6ff;text-decoration:none}
              /* Lightbox */
              .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;justify-content:center;align-items:center;cursor:zoom-out}
              .lightbox.active{display:flex}
              .lightbox img{max-width:90%;max-height:90%;border-radius:12px}
            </style>
          </head>
          <body>
            <h1>SwiftUI Previews</h1>
            <p class="meta">
              Rendus issus du commit
              <a href="${COMMIT_URL}" target="_blank" rel="noopener noreferrer"><code>${COMMIT_SHA_SHORT}</code></a><br>
              <code>${COMMIT_SHA_FULL}</code><br>
              ${COMMIT_MSG}<br>
              ${TIMESTAMP}
            </p>
          HTMLEOF

          if [ "${ERROR_COUNT}" -gt 0 ]; then
            cat >> rendered/index.html << HTMLEOF
            <div class="status error">
              <strong>Certains rendus ont echoue pour ce commit.</strong>
              <div>Les previews concernees sont listees ci-dessous.</div>
              <ul>
          HTMLEOF
            while IFS= read -r err; do
              [ -n "$err" ] || continue
              printf '                <li>%s</li>\n' "$err" >> rendered/index.html
            done < rendered/render-errors.txt
            cat >> rendered/index.html << HTMLEOF
              </ul>
            </div>
          HTMLEOF
          else
            cat >> rendered/index.html << HTMLEOF
            <div class="status ok">
              <strong>Tous les rendus ont reussi pour ce commit.</strong>
            </div>
          HTMLEOF
          fi

          cat >> rendered/index.html << HTMLEOF
            <div class="grid">
          HTMLEOF

          for f in PreviewRenders/*.swift; do
            [ -f "$f" ] || continue
            base="$(basename "$f" .swift)"
            light_path="rendered/light/${base}.png"
            dark_path="rendered/dark/${base}.png"
            light_failed=0
            dark_failed=0
            grep -Fq "$(printf '%s\t%s\t%s' "$base" "light" "failed")" rendered/render-status.tsv && light_failed=1 || true
            grep -Fq "$(printf '%s\t%s\t%s' "$base" "dark" "failed")" rendered/render-status.tsv && dark_failed=1 || true
            printf '%s\n' \
              "  <div class=\"card\">" \
              "    <h2>${base}</h2>" \
              "    <div class=\"modes\">" \
              "      <div class=\"mode\">" >> rendered/index.html
            if [ -f "$light_path" ]; then
              printf '%s\n' "        <img src=\"light/${base}.png\" alt=\"${base} light\" onclick=\"openLightbox(this)\">" >> rendered/index.html
            elif [ $light_failed -eq 1 ]; then
              printf '%s\n' "        <div class=\"missing\">Rendu light echoue pour ce commit</div>" >> rendered/index.html
            else
              printf '%s\n' "        <div class=\"missing\">Image light indisponible</div>" >> rendered/index.html
            fi
            printf '%s\n' \
              "        <p>Light</p>" \
              "      </div>" \
              "      <div class=\"mode\">" >> rendered/index.html
            if [ -f "$dark_path" ]; then
              printf '%s\n' "        <img src=\"dark/${base}.png\" alt=\"${base} dark\" onclick=\"openLightbox(this)\">" >> rendered/index.html
            elif [ $dark_failed -eq 1 ]; then
              printf '%s\n' "        <div class=\"missing\">Rendu dark echoue pour ce commit</div>" >> rendered/index.html
            else
              printf '%s\n' "        <div class=\"missing\">Image dark indisponible</div>" >> rendered/index.html
            fi
            printf '%s\n' \
              "        <p>Dark</p>" \
              "      </div>" \
              "    </div>" \
              "  </div>" >> rendered/index.html
          done

          cat >> rendered/index.html << 'HTMLEOF'
            </div>
            <p class="footer">
              Auto-generated by <a href="https://github.com/olliewagner/swiftui-render">swiftui-render</a>
              via GitHub Actions
            </p>
            <div class="lightbox" id="lb" onclick="this.classList.remove('active')">
              <img id="lb-img" src="">
            </div>
            <script>
              function openLightbox(el) {
                document.getElementById('lb-img').src = el.src;
                document.getElementById('lb').classList.add('active');
              }
            </script>
          </body></html>
          HTMLEOF

          cp .preview-cache/preview-hashes.new.txt .preview-cache/preview-hashes.txt

      - name: Save rendered previews cache
        uses: actions/cache/save@v4
        with:
          path: |
            rendered
            .preview-cache
          key: ${{ runner.os }}-swiftui-render-${{ github.ref_name }}-${{ github.sha }}

      # Déployer sur GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: rendered/

  deploy:
    needs: render
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


